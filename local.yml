services:
  traefik:
    image: docker.io/traefik:v3.7.5
    restart: unless-stopped
    ports:
      - "80:80"
      - "8080:8080"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ./backend/docker/local/traefik/traefik.yml:/etc/traefik/traefik.yml:ro
    networks:
      - bankito_local_nw
    command:
      - --providers.docker

  api: &api
    build:
      context: .
      dockerfile: ./backend/docker/local/fastapi/Dockerfile
    volumes:
      - .:/src
      # Keep the image's project venv from being shadowed by the bind mount above.
      - /src/.venv
      - ./backend/app/logs:/src/backend/app/logs
    ports:
      - "8000:8000"
    env_file:
      - ./.envs/.env.local
    depends_on:
      postgres:
        condition: service_healthy
      mailpit:
        condition: service_started
      redis:
        condition: service_started
      rabbitmq:
        condition: service_started
    command: /start.sh
    networks:
      - bankito_local_nw
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.api.entrypoints=web"
      - "traefik.http.routers.api.rule=Host(`api.localhost`)"
      - "traefik.http.routers.api.service=api-service"
      - "traefik.http.services.api-service.loadbalancer.server.port=8000"
      - "traefik.http.services.api-service.loadbalancer.healthcheck.path=/health"
      - "traefik.http.services.api-service.loadbalancer.healthcheck.interval=30s"
      - "traefik.http.services.api-service.loadbalancer.healthcheck.timeout=5s"

  mailpit:
    image: docker.io/axllent/mailpit:v1.30
    ports:
      - "8025:8025"
      - "1025:1025"
    volumes:
      - bankito_local_mailpit_data:/data
    environment:
      MP_MAX_MESSAGES: 5000
      MP_DATA_FILE: /data/mailpit.db
      MP_SMTP_AUTH_ACCEPT_ANY: 1
      MP_SMTP_AUTH_ALLOW_INSECURE: 1
    networks:
      - bankito_local_nw

  postgres:
    build:
      context: .
      dockerfile: ./backend/docker/local/postgres/Dockerfile
    ports:
      # host 5433 -> container 5432 (standard internal port)
      - "5433:5432"
    volumes:
      - bankito_local_db:/var/lib/postgresql/data
    env_file:
      - ./.envs/.env.local
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - bankito_local_nw

  redis:
    image: docker.io/redis:8.8.0-alpine
    command: redis-server --appendonly yes
    networks:
      - bankito_local_nw
  
  rabbitmq:
    image: docker.io/rabbitmq:3.13-management-alpine
    ports:
      - "15672:15672"
      - "5672:5672"
    volumes:
      - bankito_local_rabbitmq_data:/var/lib/rabbitmq
    networks:
      - bankito_local_nw
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.rabbitmq.entrypoints=web"
      - "traefik.http.routers.rabbitmq.rule=Host(`rabbitmq.localhost`)"
      - "traefik.http.routers.rabbitmq.service=rabbitmq-service"
      - "traefik.http.services.rabbitmq-service.loadbalancer.server.port=15672"

  celeryworker:
    <<: *api
    ports: []
    command: /start-celeryworker.sh
    # Override the inherited api labels: workers don't serve HTTP, so they must
    # not register the `api` Traefik router/service (would appear as DOWN backends).
    labels:
      - "traefik.enable=false"

  flower:
    <<: *api
    ports:
      - "5555:5555"
    volumes:
      - bankito_local_flower_data:/data
    command: /start-flower.sh
    depends_on:
      - redis
      - rabbitmq
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.flower.entrypoints=web"
      - "traefik.http.routers.flower.rule=Host(`flower.localhost`)"
      - "traefik.http.routers.flower.service=flower-service"
      - "traefik.http.services.flower-service.loadbalancer.server.port=5555"
  
  celerybeat:
    <<: *api
    ports: []
    command: /start-celerybeat.sh
    labels:
      - "traefik.enable=false"


networks:
  bankito_local_nw:
    external: true

volumes:
  bankito_local_db:
  bankito_local_mailpit_data:
  bankito_local_rabbitmq_data:
  bankito_local_flower_data:
